<style>
/* Talks & Media — list + single styles (self-contained).
   Design after wesmckinney.com/presentations + /transcripts: Inter for headings/UI,
   Lora for prose, IBM Plex Mono for the #N chip, warm-cream palette. */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap');

.talks-wrapper {
  --t-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --t-serif: 'Lora', 'Georgia', 'Times New Roman', serif;
  --t-mono: 'IBM Plex Mono', 'Menlo', monospace;
  --t-text: #2C2416;
  --t-heading: #1A1408;
  --t-secondary: #6B5D4D;
  --t-border: #E8DFD0;
  --t-card-bg: #FFFEFA;
  --t-card-border: #D0C4B0;
  --t-btn-bg: #F5EEE3;
  --t-btn-border: #E0D6C8;
  --t-link: #996633;
  --t-accent: #2a9d8f;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 1rem;
  font-family: var(--t-sans);
  color: var(--t-text);
}
body:not(.dark) { background-color: #FDF8F0; }

/* ---------- list page ---------- */
.talks-page-title {
  font-family: var(--t-sans);
  font-size: 2.2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.2;
  color: var(--t-heading);
  margin: 2rem 0 1rem;
}
.talks-intro {
  font-family: var(--t-serif);
  font-size: 1.02rem;
  line-height: 1.7;
  margin-bottom: 1.6rem;
  color: var(--t-secondary);
}
.talks-section-label {
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #a08c5b;
  border-bottom: 1px solid var(--t-border);
  padding-bottom: 0.5rem;
  margin-bottom: 1.2rem;
}
.talk-card {
  position: relative;
  background: var(--t-card-bg);
  border: 1px solid var(--t-card-border);
  border-radius: 10px;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
  padding: 1rem 1.25rem 1.1rem;
  margin-bottom: 1.1rem;
  transition: box-shadow 0.15s ease-in-out;
}
.talk-card:hover { box-shadow: 0 3px 10px rgba(0, 0, 0, 0.09); }
.talk-card .talk-num { position: absolute; top: 0.85rem; right: 1rem; }
.talk-card .talk-card-top { padding-right: 3.2rem; }
.talk-card-top {
  display: flex;
  align-items: baseline;
  flex-wrap: wrap;
  gap: 0.35rem 0.65rem;
}
.talk-badge {
  display: inline-block;
  font-family: var(--t-sans);
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  white-space: nowrap;
}
.talk-badge-talk { background: #e3f2fd; color: #1565c0; }
.talk-badge-keynote { background: #fff3e0; color: #e65100; }
.talk-badge-panel { background: #e0f2f1; color: #00695c; }
.talk-badge-podcast { background: #f3e5f5; color: #6a1b9a; }
.talk-badge-radio { background: #e8f5e9; color: #2e7d32; }
.talk-badge-tutorial { background: #fce4ec; color: #ad1457; }
.talk-badge-academic { background: #e8eaf6; color: #283593; }
.talk-event { font-weight: 600; font-size: 1rem; color: var(--t-text); }
.talk-event a { color: inherit; }
.talk-event a:hover { color: var(--t-link); text-decoration: none; }
.talk-meta { margin-left: auto; font-size: 0.85rem; color: #8A7B6A; }
.talk-num {
  font-family: var(--t-mono);
  font-size: 0.72rem;
  color: var(--t-secondary);
  background: var(--t-btn-bg);
  border-radius: 5px;
  padding: 0.15rem 0.4rem;
  white-space: nowrap;
}
.talk-title {
  font-family: var(--t-serif);
  font-size: 1.15rem;
  font-style: italic;
  font-weight: 500;
  margin: 0.45rem 0 0.55rem;
  line-height: 1.35;
}
.talk-title a { color: var(--t-text); }
.talk-title a:hover { color: var(--t-link); text-decoration: none; }
.talk-links { display: flex; flex-wrap: wrap; gap: 0.6rem; }
.talk-btn {
  display: inline-block;
  font-family: var(--t-sans);
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--t-secondary) !important;
  background: var(--t-btn-bg);
  border: 1px solid var(--t-btn-border);
  border-radius: 5px;
  padding: 0.35rem 0.7rem;
  text-decoration: none !important;
  transition: all 0.15s ease;
}
.talk-btn:hover {
  background: #EBE3D6;
  border-color: #C4B8A8;
  color: var(--t-heading) !important;
}

/* ---------- single page ---------- */
.talk-single.has-toc {
  display: flex;
  gap: 2.5rem;
  max-width: 1150px;
}
.talk-single .talk-main { flex: 1 1 auto; min-width: 0; max-width: 900px; margin: 0 auto; }
.talk-title-lg {
  font-family: var(--t-sans);
  font-size: 2.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.15;
  color: var(--t-heading);
  margin: 2rem 0 1.5rem;
}
.talk-info-card {
  position: relative;
  background: var(--t-card-bg);
  border: 1px solid var(--t-card-border);
  border-radius: 10px;
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
  padding: 1.5rem 1.75rem;
  margin-bottom: 2rem;
}
.talk-info-card .talk-badge { position: absolute; top: 1.5rem; right: 1.75rem; }
.talk-meta-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.5rem 1.5rem;
  padding-right: 7rem;
  margin-bottom: 0.25rem;
}
.talk-meta-item { display: flex; align-items: baseline; gap: 0.4rem; }
.talk-meta-label {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--t-secondary);
}
.talk-meta-value { font-size: 0.95rem; font-weight: 500; color: var(--t-text); }
.talk-meta-value a { color: inherit; text-decoration: none; }
.talk-meta-value a:hover { text-decoration: underline; }
.talk-info-card .talk-links { margin-top: 1rem; }
.video-container {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  margin-bottom: 2rem;
  border-radius: 8px;
  overflow: hidden;
  background: #000;
}
.video-container iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}
.ai-disclaimer {
  background-color: var(--t-btn-bg);
  border-left: 3px solid #C4B8A8;
  padding: 0.75rem 1rem;
  margin: 0 0 2rem 0;
  font-family: var(--t-sans);
  font-size: 0.85rem;
  color: var(--t-secondary);
  border-radius: 0 6px 6px 0;
}
.talk-main h2 {
  font-family: var(--t-sans);
  font-size: 1.25rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--t-heading);
  margin: 2rem 0 0.75rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--t-border);
}
.talk-main h2#transcript {
  margin-top: 3rem;
  padding-top: 2rem;
  border-top: 2px solid var(--t-border);
  border-bottom: none;
}
.talk-content { font-family: var(--t-serif); }
.talk-content p {
  font-size: 1rem;
  line-height: 1.75;
  margin-bottom: 1rem;
  color: var(--t-text);
}
.talk-content a { color: var(--t-link); }
.talk-content blockquote {
  border-left: 3px solid var(--t-link);
  padding-left: 1.25rem;
  margin: 1.5rem 0;
}

/* ---------- contents rail ---------- */
.talk-toc {
  order: 2;
  flex: 0 0 170px;
  position: sticky;
  top: 90px;
  align-self: flex-start;
  padding-top: 2.5rem;
}
.talk-toc-title {
  font-family: var(--t-sans);
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--t-secondary);
  margin-bottom: 0.6rem;
}
.talk-toc ul { list-style: none; margin: 0; padding: 0; }
.talk-toc li { margin: 0; padding: 0; }
.talk-toc a {
  display: block;
  font-family: var(--t-serif);
  font-size: 0.95rem;
  color: var(--t-secondary);
  text-decoration: none;
  padding: 0.2rem 0 0.2rem 0.75rem;
  border-left: 2px solid var(--t-border);
}
.talk-toc a:hover { color: var(--t-heading); }
.talk-toc a.active { color: var(--t-accent); border-left-color: var(--t-accent); }
@media (max-width: 1099px) { .talk-toc { display: none; } .talk-single.has-toc { display: block; } }

/* ---------- dark mode (Academic adds body.dark) ---------- */
body.dark .talks-wrapper {
  --t-text: #e8e8e8;
  --t-heading: #f5f5f5;
  --t-secondary: #a0a0a0;
  --t-border: rgba(255, 255, 255, 0.15);
  --t-card-bg: #242424;
  --t-card-border: rgba(255, 255, 255, 0.1);
  --t-btn-bg: #2a2a2a;
  --t-btn-border: rgba(255, 255, 255, 0.15);
  --t-link: #c9975c;
}
body.dark .talk-card, body.dark .talk-info-card { box-shadow: none; }
body.dark .talk-btn:hover { background: #333; border-color: rgba(255, 255, 255, 0.3); }
body.dark .talk-meta { color: #808080; }
body.dark .ai-disclaimer { border-left-color: rgba(255, 255, 255, 0.2); }
body.dark .talk-badge-talk { background: rgba(21, 101, 192, 0.25); color: #90caf9; }
body.dark .talk-badge-keynote { background: rgba(230, 81, 0, 0.25); color: #ffb74d; }
body.dark .talk-badge-panel { background: rgba(0, 105, 92, 0.25); color: #80cbc4; }
body.dark .talk-badge-podcast { background: rgba(106, 27, 154, 0.3); color: #ce93d8; }
body.dark .talk-badge-radio { background: rgba(46, 125, 50, 0.25); color: #a5d6a7; }
body.dark .talk-badge-tutorial { background: rgba(173, 20, 87, 0.25); color: #f48fb1; }
body.dark .talk-badge-academic { background: rgba(40, 53, 147, 0.35); color: #9fa8da; }

@media (max-width: 768px) {
  .talk-title-lg { font-size: 1.6rem; margin-top: 1.2rem; }
  .talk-info-card { padding: 1.25rem; }
  .talk-info-card .talk-badge { position: static; display: inline-block; margin-bottom: 0.75rem; }
  .talk-meta-row { flex-direction: column; align-items: flex-start; gap: 0.4rem; padding-right: 0; }
}
@media (max-width: 575px) {
  .talk-meta { margin-left: 0; }
  .talks-page-title { font-size: 1.7rem; }
}
</style>
